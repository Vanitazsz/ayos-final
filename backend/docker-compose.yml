services:
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: ayos
      POSTGRES_USER: ayos
      POSTGRES_PASSWORD: ayos_development_only
    ports:
      - "5433:5432"
    volumes:
      - ayos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayos -d ayos"]
      interval: 5s
      timeout: 5s
      retries: 12
  api:
    build: .
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ayos_uploads:/app/uploads

volumes:
  ayos_postgres:
  ayos_uploads:
