project_id = "a-yos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54332
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "15MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["ayos://**", "http://localhost:3000/**", "http://localhost:8081/**"]
jwt_expiry = 900
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
otp_length = 6
otp_expiry = 600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[edge_runtime]
enabled = true
policy = "per_worker"

[analytics]
enabled = false

[functions.report-export]
verify_jwt = true

[functions.ai-assist-media]
verify_jwt = true

[functions.queue-consumer]
verify_jwt = false

[functions.admin-invite-account]
verify_jwt = true
