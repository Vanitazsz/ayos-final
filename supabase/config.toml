project_id = "a-yos"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[storage.analytics]
enabled = false

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:8081"
additional_redirect_urls = ["http://localhost:8081", "http://localhost:5173", "ayos://auth/callback"]
jwt_expiry = 900
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "60s"
otp_length = 6
otp_expiry = 1800

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your A-yos verification code is {{ .Code }}"
max_frequency = "60s"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = false

[functions.api]
enabled = true
verify_jwt = true
import_map = "./functions/api/deno.json"
entrypoint = "./functions/api/index.ts"

[functions.ai-analyze-request]
enabled = true
verify_jwt = true

[functions.ai-process-job]
enabled = true
verify_jwt = true

[functions.ai-translate-message]
enabled = true
verify_jwt = true

[functions.ai-review-insights]
enabled = true
verify_jwt = true

[functions.ai-provider-health]
enabled = true
verify_jwt = true

[functions.geocode-search]
enabled = true
verify_jwt = true

[functions.geocode-reverse]
enabled = true
verify_jwt = true

[functions.route]
enabled = true
verify_jwt = true

[functions.report-generate]
enabled = true
verify_jwt = true

[functions.ai-recommendation]
enabled = true
verify_jwt = true
